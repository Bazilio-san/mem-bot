# Критерии качества цикла тюнинга — ЕДИНЫЙ источник истины для прогонщика оценок (scripts/eval.js),
# LLM-судьи (scripts/eval/judge.js) и отчёта сравнения (scripts/eval-compare.js). Пороги, оси и веса
# не дублируются ни в коде, ни в отчётах.
#
# Правка этого файла — отдельное событие: отдельный коммит с обоснованием, НЕ в той же ветке, где
# меняется промпт или код (правило «не подгонять экзамен под ученика»). Изменения принимает человек.

# Версия критериев; включается в summary.json каждого прогона.
version: 1

suites:
  # Классификатор намерений: детерминированное сравнение полей ответа с ожиданиями кейса
  # (tests/eval/classify_cases.json). Порог — минимальная доля пройденных кейсов.
  classify:
    type: deterministic
    cases_file: tests/eval/classify_cases.json
    pass_threshold: 0.9
  # Извлечение фактов: кейсы «сохранять/не сохранять» (tests/memory_cases.json — канонический набор,
  # его же использует npm test). Порог ниже classify: извлечение сильнее зависит от вариативности модели.
  facts:
    type: deterministic
    cases_file: tests/memory_cases.json
    pass_threshold: 0.8
  # Извлечение тем и вовлечённости в изоляции (src/pipeline/topics.js, extractTopics). Кейсы — диалог
  # на входе и ожидаемые темы/минимальная вовлечённость на выходе (tests/eval/topic_cases.json).
  topics:
    type: deterministic
    cases_file: tests/eval/topic_cases.json
    pass_threshold: 0.8
  # Компрессия истории в изоляции (src/pipeline/history-compress.js, summarizeColdHistory). Кейсы —
  # холодная зона диалога и снимок памяти на входе; проверяются обязательные упоминания в дайджесте,
  # запрещённые строки (редактирование секретов), вынесенные факты (tests/eval/compress_cases.json).
  compress:
    type: deterministic
    cases_file: tests/eval/compress_cases.json
    pass_threshold: 0.8
  # Дедупликация фактов в изоляции (src/pipeline/facts.js, saveFact и dedupeFactsSweep). Кейсы — список
  # фактов на запись и ожидаемое число активных фактов после дедупликации (tests/eval/dedupe_cases.json).
  dedupe:
    type: deterministic
    cases_file: tests/eval/dedupe_cases.json
    pass_threshold: 0.8
  # Выбор инструментов в изоляции: один ход модели с реальными определениями базовых инструментов,
  # без их выполнения; проверяется, какой инструмент выбрала модель (tests/eval/tool_select_cases.json).
  tools:
    type: deterministic
    cases_file: tests/eval/tool_select_cases.json
    pass_threshold: 0.8
  # Диалоговые сценарии (tests/scenarios/*.json): детерминированные проверки упоминаний
  # плюс LLM-судья по рубрике. Оси: шкала, минимально допустимый средний балл, вес в сводном балле.
  dialog:
    type: judge
    scenarios_dir: tests/scenarios
    axes:
      relevance:         { scale: [1, 5], min_avg: 4.0, weight: 0.30 }
      memory_usage:      { scale: [1, 5], min_avg: 4.0, weight: 0.25 }
      persona:           { scale: [1, 5], min_avg: 3.5, weight: 0.15 }
      format:            { scale: [1, 5], min_avg: 4.0, weight: 0.15 }
      no_hallucinations: { scale: [1, 5], min_avg: 4.5, weight: 0.15 }

# Пороги приёмки сравнения «было/стало» (scripts/eval-compare.js).
acceptance:
  # Шумовой допуск среднего балла судьи: ухудшение в пределах допуска не считается регрессией.
  quality_drop_tolerance: 0.2
  # Допустимый рост средней цены цикла (в процентах), если цель изменения — не экономия.
  cost_increase_max_pct: 10
  # Допустимый рост p95 задержки (в процентах).
  latency_p95_increase_max_pct: 15

budget:
  # Стоп-лимит стоимости одного eval-прогона в долларах: прогонщик останавливается при превышении.
  eval_run_max_usd: 2.0
