<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Прототип: заметки как Telegram Mini App</title>
<!-- В реальной странице: <script src="https://telegram.org/js/telegram-web-app.js"></script>
     Тема берётся из Telegram.WebApp.themeParams; здесь — тёмная тема Telegram как мок. -->
<style>
  :root { /* маппинг themeParams → CSS-переменные (как сделает обёртка Mini App) */
    --tg-bg: #18222d; --tg-secondary-bg: #131c26; --tg-text: #f5f5f5;
    --tg-hint: #708499; --tg-link: #6ab2f2; --tg-button: #5288c1;
    --tg-button-text: #ffffff; --tg-card: #232e3c; --tg-border: #2d3a4a;
    --danger: #ec5b5b; --pin: #e8a33d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--tg-bg); color: var(--tg-text);
         font: 15px/1.45 -apple-system, 'Segoe UI', Roboto, sans-serif; }

  /* Шапка Mini App (имитация окна Telegram) */
  .tg-chrome { position: sticky; top: 0; z-index: 10; background: var(--tg-secondary-bg);
               padding: 10px 14px; display: flex; align-items: center; gap: 10px;
               border-bottom: 1px solid var(--tg-border); }
  .tg-chrome .close { color: var(--tg-link); font-size: 15px; }
  .tg-chrome .title { font-weight: 600; flex: 1; text-align: center; }
  .tg-chrome .dots { color: var(--tg-hint); }

  .toolbar { position: sticky; top: 42px; z-index: 9; background: var(--tg-bg);
             padding: 10px 12px 8px; }
  .search { display: flex; align-items: center; gap: 8px; background: var(--tg-card);
            border: 1px solid var(--tg-border); border-radius: 10px; padding: 8px 12px; }
  .search input { flex: 1; background: transparent; border: 0; outline: 0;
                  color: var(--tg-text); font-size: 15px; }
  .search input::placeholder { color: var(--tg-hint); }
  .chips { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; scrollbar-width: none; }
  .chip { flex: 0 0 auto; font-size: 12.5px; color: var(--tg-hint); background: var(--tg-card);
          border: 1px solid var(--tg-border); border-radius: 99px; padding: 3px 11px; }
  .chip.active { color: var(--tg-button-text); background: var(--tg-button); border-color: var(--tg-button); }

  .list { padding: 4px 12px 90px; }
  .card { background: var(--tg-card); border-radius: 12px; padding: 11px 13px; margin: 8px 0;
          position: relative; }
  .card.pinned { outline: 1px solid rgba(232,163,61,.45); }
  .card .top { display: flex; gap: 8px; align-items: baseline; }
  .card .t { font-weight: 600; flex: 1; }
  .card .t .pin { color: var(--pin); font-size: 12px; margin-right: 3px; }
  .card .d { color: var(--tg-hint); font-size: 12px; white-space: nowrap; }
  .card .b { color: #c7d0d9; font-size: 13.5px; margin-top: 3px;
             display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tags { margin-top: 7px; display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; color: var(--tg-link); background: rgba(106,178,242,.12);
         padding: 1.5px 8px; border-radius: 99px; }
  /* свайп-действия (упрощённо — кнопки по тапу) */
  .row-actions { display: flex; gap: 14px; margin-top: 9px; padding-top: 8px;
                 border-top: 1px solid var(--tg-border); }
  .row-actions span { color: var(--tg-hint); font-size: 13px; }
  .row-actions span.del { color: var(--danger); }

  .sentinel { text-align: center; color: var(--tg-hint); font-size: 13px; padding: 14px; }
  .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--tg-border);
             border-top-color: var(--tg-link); border-radius: 50%;
             animation: spin .7s linear infinite; vertical-align: -3px; margin-right: 7px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MainButton Телеграма (Telegram.WebApp.MainButton) — имитация */
  .main-button { position: fixed; left: 0; right: 0; bottom: 0; background: var(--tg-button);
                 color: var(--tg-button-text); text-align: center; padding: 15px;
                 font-size: 15.5px; font-weight: 600; cursor: pointer; }

  /* Шторка редактора (bottom sheet) */
  .sheet-back { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; z-index: 20; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--tg-secondary-bg);
           border-radius: 16px 16px 0 0; padding: 16px 16px 20px; z-index: 21; display: none; }
  .sheet.open, .sheet-back.open { display: block; }
  .sheet .grab { width: 36px; height: 4px; border-radius: 2px; background: var(--tg-border);
                 margin: 0 auto 14px; }
  .sheet input, .sheet textarea { width: 100%; background: var(--tg-card); color: var(--tg-text);
      border: 1px solid var(--tg-border); border-radius: 10px; padding: 10px 12px;
      font: inherit; outline: none; margin-bottom: 10px; }
  .sheet textarea { min-height: 110px; resize: vertical; }
  .sheet .save { width: 100%; background: var(--tg-button); color: var(--tg-button-text);
                 border: 0; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; }
  .toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
           background: rgba(0,0,0,.8); color: #fff; padding: 8px 16px; border-radius: 10px;
           font-size: 12.5px; opacity: 0; transition: opacity .25s; z-index: 30;
           pointer-events: none; max-width: 90%; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="tg-chrome">
  <span class="close">Закрыть</span>
  <span class="title">📝 Мои заметки</span>
  <span class="dots">⋯</span>
</div>

<div class="toolbar">
  <div class="search">
    <span>🔍</span>
    <input id="search" placeholder="Поиск по смыслу…">
  </div>
  <div class="chips" id="chips">
    <span class="chip active" data-tag="">все</span>
    <span class="chip" data-tag="работа">работа</span>
    <span class="chip" data-tag="личное">личное</span>
    <span class="chip" data-tag="идеи">идеи</span>
    <span class="chip" data-tag="покупки">покупки</span>
    <span class="chip" data-tag="книги">книги</span>
  </div>
</div>

<div class="list" id="list"></div>
<div class="sentinel" id="sentinel"></div>

<div class="main-button" onclick="openSheet()">＋ Новая заметка</div>

<div class="sheet-back" id="sheetBack" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <input id="eTitle" placeholder="Заголовок">
  <textarea id="eBody" placeholder="Текст заметки…"></textarea>
  <input id="eTags" placeholder="Теги через запятую">
  <button class="save" onclick="save()">Сохранить</button>
</div>

<div class="toast" id="toast"></div>

<script>
// Auth в реале: заголовок X-Tg-Init-Data = Telegram.WebApp.initData на каждый запрос к /api/notes.
// Здесь — мок данных и API.
const TAGS = [['работа'],['личное'],['идеи'],['покупки'],['здоровье'],[],['книги'],['работа']];
const TITLES = ['План на квартал','Идея для бота','Список покупок','Рецепт пасты','Книги к прочтению',
  'Заметки со встречи','Тренировки','Подарки на НГ','Конспект статьи про RAG','Места для отпуска'];
const ALL = [];
for (let i = 0; i < 38; i++) ALL.push({
  id: 200 + i,
  title: TITLES[i % TITLES.length] + (i >= TITLES.length ? ` (${Math.floor(i/TITLES.length)+1})` : ''),
  body: 'Содержимое заметки №' + (200+i) + '. В мобильной карточке показываются две строки текста, ' +
        'полный текст открывается в шторке редактирования снизу.',
  tags: TAGS[i % TAGS.length], pinned: i === 2,
  updatedAt: new Date(Date.now() - i * 31e5 * 9),
});

const PAGE = 10;
let nextCursor = 0, query = '', tag = '', loading = false, editingId = null, shownCount = 0;

const fetchPage = (cursor) => new Promise(res => setTimeout(() => {
  let src = ALL.filter(n => !n.deleted);
  if (tag) src = src.filter(n => n.tags.includes(tag));
  if (query) src = src.filter(n => (n.title + n.body).toLowerCase().includes(query.toLowerCase()));
  src = [...src].sort((a, b) => (b.pinned - a.pinned) || (b.updatedAt - a.updatedAt));
  res({ items: src.slice(cursor, cursor + PAGE),
        nextCursor: cursor + PAGE < src.length ? cursor + PAGE : null });
}, 320));

const list = document.getElementById('list'), sentinel = document.getElementById('sentinel');
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = d => d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

function cardHtml(n) {
  return `<div class="card ${n.pinned ? 'pinned' : ''}">
    <div class="top">
      <span class="t">${n.pinned ? '<span class="pin">📌</span>' : ''}${esc(n.title)}</span>
      <span class="d">${fmt(n.updatedAt)}</span>
    </div>
    <div class="b">${esc(n.body)}</div>
    ${n.tags.length ? `<div class="tags">${n.tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}
    <div class="row-actions">
      <span onclick="openSheet(${n.id})">✏️ Изменить</span>
      <span onclick="togglePin(${n.id})">${n.pinned ? '📌 Открепить' : '📍 Закрепить'}</span>
      <span class="del" onclick="del(${n.id})">🗑️ Удалить</span>
    </div>
  </div>`;
}

async function load(reset) {
  if (loading) return; loading = true;
  if (reset) { nextCursor = 0; shownCount = 0; list.innerHTML = ''; }
  sentinel.innerHTML = '<span class="spinner"></span>загрузка…';
  const { items, nextCursor: nc } = await fetchPage(nextCursor);
  nextCursor = nc; shownCount += items.length;
  list.insertAdjacentHTML('beforeend', items.map(cardHtml).join(''));
  sentinel.textContent = nc === null
    ? (shownCount ? '— конец списка —' : 'Ничего не найдено') : '';
  loading = false;
}

new IntersectionObserver(es => {
  if (es[0].isIntersecting && nextCursor !== null && !loading) load(false);
}, { rootMargin: '120px' }).observe(sentinel);

let t;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(t); t = setTimeout(() => { query = e.target.value.trim(); load(true); }, 400);
});
document.getElementById('chips').addEventListener('click', e => {
  if (!e.target.dataset || e.target.dataset.tag === undefined) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  tag = e.target.dataset.tag; load(true);
});

function openSheet(id) {
  editingId = id ?? null;
  const n = id ? ALL.find(x => x.id === id) : { title: '', body: '', tags: [] };
  document.getElementById('eTitle').value = n.title;
  document.getElementById('eBody').value = n.body;
  document.getElementById('eTags').value = n.tags.join(', ');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheetBack').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetBack').classList.remove('open');
}
function save() {
  const title = document.getElementById('eTitle').value.trim() || 'Без названия';
  const body = document.getElementById('eBody').value.trim();
  const tags = document.getElementById('eTags').value.split(',').map(s => s.trim()).filter(Boolean);
  if (editingId) {
    Object.assign(ALL.find(x => x.id === editingId), { title, body, tags, updatedAt: new Date() });
    toast(`PATCH /api/notes/${editingId} → история LLM: «отредактировал заметку #${editingId}»`);
  } else {
    const id = Math.max(...ALL.map(n => n.id)) + 1;
    ALL.unshift({ id, title, body, tags, pinned: false, updatedAt: new Date() });
    toast(`POST /api/notes → история LLM: «создал заметку #${id}»`);
  }
  closeSheet(); load(true);
}
function del(id) {
  ALL.find(x => x.id === id).deleted = true;
  toast(`DELETE /api/notes/${id} → история LLM: «удалил заметку #${id}»`);
  load(true);
}
function togglePin(id) {
  const n = ALL.find(x => x.id === id); n.pinned = !n.pinned; load(true);
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

load(true);
</script>
</body>
</html>
