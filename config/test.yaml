---
# Переопределения для тестов (запуск с NODE_ENV=test). Единственный способ менять конфигурацию под тесты —
# прямого чтения process.env в коде нет. Сюда выносится всё, что тестам нужно иначе, чем в разработке:
# отдельная тестовая БД, выключенные внешние контуры, детерминированные лимиты.
#
# Заглушки обязательных секретов, чтобы модульные тесты (не обращающиеся к БД и LLM) могли загрузить
# конфигурацию без реального окружения. Для интеграционного прогона реальные значения задаются в
# config/local.yaml или через переменные окружения и перекрывают эти заглушки.
db:
  postgres:
    dbs:
      bootstrap:
        password: 'test'
        user: 'test'
      main:
        password: 'test'
        user: 'test'
llm:
  apiKey: 'test-key'

# Пример отдельной тестовой БД (раскомментируйте при необходимости):
# db:
#   postgres:
#     dbs:
#       main:
#         database: 'agent_mem_test'
