---
# Скопируйте этот файл в config/local.yaml и впишите реальные секреты.
# config/local.yaml в .gitignore и не коммитится. Это рекомендуемый способ хранения секретов локально.
authSecret: 'СГЕНЕРИРУЙТЕ_ДЛИННУЮ_СЛУЧАЙНУЮ_СТРОКУ'
db:
  postgres:
    dbs:
      bootstrap:
        host: 'localhost'
        password: 'ПАРОЛЬ_БД'
        user: 'ПОЛЬЗОВАТЕЛЬ_БД'
      # Подключение logs (БД журналов mem_bot_logs) задавать не обязательно: пустые host/port/user/password
      # наследуются от main. Раскомментируйте и заполните только если журналы живут на другом сервере.
      # logs:
      #   database: 'mem_bot_logs'
      #   host: 'другой-сервер'
      #   password: 'ПАРОЛЬ_БД_ЛОГОВ'
      #   user: 'ПОЛЬЗОВАТЕЛЬ_БД_ЛОГОВ'
      main:
        database: 'mem_bot'
        host: 'localhost'
        password: 'ПАРОЛЬ_БД'
        user: 'ПОЛЬЗОВАТЕЛЬ_БД'
llm:
  apiKey: 'sk-...'
  baseURL: 'https://litellm.my-proxy.com/v1'
telegram:
  #> Username (Id) бота для навигации при тестировании с playwright
  botUsername: ''
  apiKey: 'ТОКЕН_БОТА'
