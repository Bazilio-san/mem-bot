# sudo vim /etc/nginx/sites-enabled/time-gold.com.conf

upstream mem_bot {
    server 127.0.0.1:9019;
    keepalive 8;
}

# HTTPS server
server {
    server_name mem-bot.time-gold.com;
    access_log /opt/log/nginx/mem-bot.time-gold.com.log main;
    error_log  /opt/log/nginx/mem-bot.time-gold.com.ERROR.log;

    client_max_body_size 1m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json text/markdown;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Currency service API
    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://mem_bot;
        proxy_redirect off;
    }

    # Health, who, help
    location ~ ^/(health|who|help)$ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://mem_bot;
        proxy_redirect off;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/time-gold.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/time-gold.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirect
server {
    if ($host = mem-bot.time-gold.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 0.0.0.0:80;
    server_name mem-bot.time-gold.com;
    return 404; # managed by Certbot
}

# sudo systemctl restart nginx
